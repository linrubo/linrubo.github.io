<!doctype html>
<html>
	<head>
		<title>Network</title>
		<meta charset="utf-8">
		<meta name="keywords" content="">
		<meta name="description" content="">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<style type="text/css">
			#output {
				display: block;
				width: 90%;
				margin: 0 auto;
			}
		</style>
	</head>

	<body>
		<div>20.730.1729</div>
		<textarea name="" id="output" cols="30" rows="20"></textarea>
		<script>
			var output = document.querySelector('#output');
			var size = Math.round(2090391 / 1024);
			var timing = [];
			var count = 0;
			var flags = [
				'DNS+Connection+RTT',
				'Connection+RTT',
				'RTT',
				'BandWidth'
			];
			var list = [
				'https://pic3.zhimg.com/v2-d85f4542540fe75e42b0b885924f3630_b.jpg',
				'https://pic3.zhimg.com/v2-d85f4542540fe75e42b0b885924f3630_b.jpg',
				'https://pic3.zhimg.com/v2-d85f4542540fe75e42b0b885924f3630_b.jpg',
				'https://pic3.zhimg.com/v2-d85f4542540fe75e42b0b885924f3630_b.webp'
			];
			var onload = function (index) {
				return function () {
					var item = timing[index];
					item.end = Date.now();
					item.timing = item.end - item.start;

					count += 1;
					if (count === list.length) {
						output.innerHTML = JSON.stringify(timing, null, 4);
						output.innerHTML += '\nbandwidth:\n';
						output.innerHTML += size / (timing[3].timing - timing[2].timing) * 1000;
					}
				};
			};

			list.forEach(function (item, index) {
				var ts = Math.random().toString(36).slice(-6);
				var image = new Image();

				timing[index] = {
					flag: flags[index],
					start: Date.now()
				};
				image.onload = onload(index);
				image.src = item + '?ts=' + ts;
			});
		</script>
	</body>
</html>

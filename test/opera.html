<!doctype html>
<html>
	<head>
		<title>opera</title>
		<meta charset="utf-8">
		<meta name="keywords" content="">
		<meta name="description" content="">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<style type="text/css">
			body {
				margin: 0;
			}
			h1 {
				text-align: center;
			}
			#output {
				display: block;
				width: 90%;
				margin: 10px auto;
				border: 1px solid #000;
				background: #eee;
				font-size: inherit;
			}
		</style>
	</head>

	<body>
		<h1>20.801.1449</h1>
		<textarea name="" id="output" cols="30" rows="20"></textarea>
		<script>
			var output = document.querySelector('#output');

			var features = {
				ajax: function () {
					return 'XMLHttpRequest' in window;
				},
				storage: function () {
					localStorage.setItem('name', 'demon');
					return 'localStorage' in window;
				},
				history: function () {
					return 'pushState' in history && 'replaceState' in history;
				},
				fetch: function () {
					return 'fetch' in window;
				},
				es6: function () {
					return 'Promise' in window;
				},
				network: function () {
					return 'connection' in navigator;
				},
				performance: function () {
					return 'performance' in window;
				},
				cookie: function () {
					document.cookie = '__testcookie__=test';
					return navigator.cookieEnabled !== undefined && document.cookie.indexOf('__testcookie__=test') !== -1;
				},
				sniff: function () {
					return Object.prototype.toString.call(window.operamini) === "[object OperaMini]"
				},
				postMessage: function () {
					return 'postMessage' in window;
				}
			};
			var request = function (option) {
				var xhr = new XMLHttpRequest();
				xhr.onreadystatechange = function () {
					if (xhr.readyState === 4) {
						if ((xhr.status >= 200 && xhr.status < 300) || xhr.status == 304) {
							option.success(xhr.responseText);
						}
					}
				};
				xhr.open('GET', option.url, true);
				xhr.send();
			};

			document.querySelector('h1').addEventListener('click', function (event) {
				var result = {};
				Object.keys(features).forEach(function (key) {
					try {
						result[key] = features[key]();
					} catch (e) {
						result[key] = false;
					}
				});
				output.innerHTML = JSON.stringify(result, null, 4);
				event.preventDefault();
			}, false);

			output.innerHTML = navigator.userAgent;

			setTimeout(function () {
				request({
					url: '/route/a.html',
					success: function (response) {
						output.innerHTML = response;
					}
				});
			}, 5000);

			var count = 0;
			var timer = setInterval(function () {
				output.style['background'] = '#' + Math.random().toString(16).slice(-6);
				count += 1;
				if (count >= 10) {
					clearInterval(timer);
				}
			}, 17);
		</script>
	</body>
</html>

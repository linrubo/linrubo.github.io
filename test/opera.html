<!doctype html>
<html>
	<head>
		<title>opera</title>
		<meta charset="utf-8">
		<meta name="keywords" content="">
		<meta name="description" content="">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<style type="text/css">
			body {
				margin: 0;
			}
			p {
				text-align: center;
				font-size: 1.2em;
				height: 3em;
				line-height: 3em;
				background: #eee;
				margin: 0;
			}
			#output {
				display: block;
				width: 90%;
				margin: 10px auto;
				border: 1px solid #000;
				background: #eee;
				font-size: inherit;
			}
		</style>
	</head>

	<body>
		<p>Version <span>20.731.1352</span></p>
		<textarea name="" id="output" cols="30" rows="20">
		</textarea>
		<script>
			var output = document.querySelector('#output');

			var features = {
				ajax: function () {
					return 'XMLHttpRequest' in window;
				},
				storage: function () {
					localStorage.setItem('name', 'demon');
					return 'localStorage' in window;
				},
				history: function () {
					return 'pushState' in history && 'replaceState' in history;
				},
				fetch: function () {
					return 'fetch' in window;
				},
				es6: function () {
					return 'Promise' in window;
				},
				network: function () {
					return 'connection' in navigator;
				},
				performance: function () {
					return 'performance' in window;
				}
			};
			var request = function (option) {
				var xhr = new XMLHttpRequest();
				xhr.onreadystatechange = function () {
					if (xhr.readyState === 4) {
						if ((xhr.status >= 200 && xhr.status < 300) || xhr.status == 304) {
							option.success(xhr.responseText);
						}
					}
				};
				xhr.open('GET', option.url, true);
				xhr.send();
			};

			document.querySelector('p').addEventListener('click', function (event) {
				var result = {};
				Object.keys(features).forEach(function (key) {
					try {
						result[key] = features[key]();
					} catch (e) {
						result[key] = false;
					}
				});
				output.innerHTML = JSON.stringify(result, null, 4);
			}, false);

			output.innerHTML = navigator.userAgent;
		</script>
	</body>
</html>

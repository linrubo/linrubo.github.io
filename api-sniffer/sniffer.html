<!doctype html>
<html>
	<head>
		<title>API Sniffer</title>
		<meta charset="utf-8">
		<meta name="keywords" content="">
		<meta name="description" content="">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<style type="text/css">
			body {
				margin: 0;
				font-size: 16px;
				font-size: calc(12px + (16 - 12) * ((100vw - 360px) / (1500 - 360)));
				font-family: Consolas, 'Courier New';
				color: #333;
			}
			#title {
				position: sticky;
				top: 0;
				margin: 0;
				line-height: 2em;
				text-align: center;
				background: #eee;
			}
			#list {
				width: 50%;
				min-width: 320px;
				margin: 1em auto;
				padding: 1em;
				border: 1px solid #eee;
				border-radius: 1em;
				cursor: default;
			}
			#list dt {
				font-size: 1.5em;
				font-weight: bold;
				line-height: 2em;
				border-bottom: 1px solid #000;
			}
			#list dd {
				line-height: 2em;
				margin: 0;
			}
			#list dd:nth-child(odd) {
				background: #eee;
			}
			#list .unreal,
			#list .missing {
				cursor: help;
			}
			#list .unreal {
				color: #00f;
			}
			#list .missing {
				color: #f00;
			}
		</style>
	</head>

	<body>
		<h1 id="title"> API </h1>
		<dl id="list">
		</dl>
		<script src="script/sniffer.js" charset="utf-8"></script>
	</body>
</html>

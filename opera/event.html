<!doctype html>
<html>
	<head>
		<title>event test</title>
		<meta charset="utf-8">
		<meta name="keywords" content="">
		<meta name="description" content="">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<style type="text/css">
			body {
				margin: 0;
			}
			h1 {
				text-align: center;
				cursor: pointer;
			}
			#output {
				display: block;
				width: 90%;
				margin: 1em auto;
				border: 1px solid #000;
				background: #eee;
				font-size: inherit;
			}
		</style>
	</head>

	<body>
		<h1>20.801.1603</h1>
		<textarea name="" id="output" cols="30" rows="10"></textarea>
		<ul>
			<li><a href="#">link001</a></li>
			<li><a href="#">link002</a></li>
			<li><a href="#">link003</a></li>
			<li><a href="#">link004</a></li>
			<li><a href="#">link005</a></li>
		</ul>
		<script>
			var output = document.querySelector('#output');
			document.addEventListener('click', function (event) {
				var result = {};
				var list = ["NONE","CAPTURING_PHASE","AT_TARGET",
				"BUBBLING_PHASE","bubbles","cancelable","composed",
				"currentTarget","defaultPrevented","eventPhase",
				"isTrusted","target","timeStamp","type","composedPath",
				"preventDefault","stopImmediatePropagation","stopPropagation"];

				list.forEach(function (item) {
					result[item] = item in event;
				});

				output.innerHTML = event.target.tagName.toLowerCase();
				output.innerHTML += '\n';
				output.innerHTML += JSON.stringify(result, null, 4);

				event.preventDefault();
			}, false);
		</script>
	</body>
</html>

<!doctype html>
<html>
	<head>
		<title>timer test</title>
		<meta charset="utf-8">
		<meta name="keywords" content="">
		<meta name="description" content="">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
		<style type="text/css">
			body {
				margin: 0;
				cursor: pointer;
			}
			h1 {
				text-align: center;
			}
			#output {
				display: block;
				width: 90%;
				margin: 1em auto;
				border: 1px solid #000;
				background: #eee;
				font-size: inherit;
			}
		</style>
	</head>

	<body>
		<h1>20.801.1246</h1>
		<textarea name="" id="output" cols="30" rows="20"></textarea>
		<script>
			var timer = null;
			var count = 0;
			var output = document.querySelector('#output');

			function timeout() {
				setTimeout(function () {
					output.innerHTML += 'setTimeout 5s.\n';
				}, 5000);

				setTimeout(function () {
					output.innerHTML += 'setTimeout 6s.\n';
				}, 6000);

				setTimeout(function () {
					output.innerHTML += 'setTimeout 3s.\n';
					setTimeout(function () {
						output.innerHTML += 'inner setTimeout 4s.\n';
					}, 4000);
				}, 3000);

				document.body.addEventListener('click', function (event) {
					output.innerHTML = 'event type: ' + event.type;
					setTimeout(function () {
						output.innerHTML += '\nsetTimeout 5s.\n';
					}, 5000);
				}, false);
			}

			function interval() {
				timer = setInterval(function () {
					count += 1;
					output.innerHTML += count + '.\n';
					if (count >= 10) {
						clearInterval(timer);
					}
				}, 1000);
			}

			timeout();
			// interval();
		</script>
	</body>
</html>

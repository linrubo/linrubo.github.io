		<link rel="stylesheet" type="text/css" href="//lite.sdktest.com/source/css/pure-min.css" />
		<style type="text/css">
			body {

				color: #eee;

			form {
				display: flex;

				border: 0 none;
				outline: 0 none;
			}
			form label {
				width: 1.5em;
				height: 1.5em;

				text-indent: -999em;

			form .input {
				flex: 1 0  0;
			}
			form input {
				width: 100%;
				background: transparent;
			}
			form button {
				width: 5em;
				color: #333;
				font-weight: bold;
				background: #f3d247;
			}

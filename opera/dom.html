		<style type="text/css">
			body {
				margin: 0;
				cursor: pointer;
			}
			h1 {
				text-align: center;
			}
			#output {
				display: block;
				width: 90%;
				margin: 1em auto;

				background: #eee;
				font-size: inherit;

	<body>
		<h1>20.801.1647</h1>
		<textarea name="" id="output" cols="30" rows="20"></textarea>
		<script>
			var output = document.querySelector('#output');
			var result = {};

			var element = ["childElementCount", "children", "firstElementChild",
			"lastElementChild", "nextElementSibling", "previousElementSibling",
			"replaceWith", "attributes", "classList", "className", "id", "tagName",
			"closest", "getAttributeNames", "matches", "toggleAttribute"];

			var node = ["childNodes", "firstChild", "lastChild", "nextSibling",
			"previousSibling", "nodeName", "nodeType", "nodeValue", "ownerDocument",
			"parentElement", "parentNode", "textContent"];

			element.forEach(function (key) {
				result[key] = key in output;
			});
			node.forEach(function (key) {
				result[key] = key in output;
			});

			output.innerHTML = JSON.stringify(result, null, 4);
		</script>
	</body>

<!doctype html>
<html>
	<head>
		<title>Document</title>
		<meta charset="utf-8">
		<meta name="keywords" content="">
		<meta name="description" content="">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	</head>

	<body>
		<input type="number" name="amount" id="">
		<script>
			var handler = function (event) {
				alert(event.type);
			};
			document.querySelector('input[name=amount]').addEventListener('focus', handler);
			document.querySelector('input[name=amount]').addEventListener('click', handler);
			document.querySelector('input[name=amount]').addEventListener('change', handler);
			document.querySelector('input[name=amount]').addEventListener('blur', handler);
		</script>
	</body>
</html>
